<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Blissé Admin</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f7f8fa;color:#111;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── หน้า center (loading / login / denied) ── */
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:32px 24px;max-width:380px;width:100%;text-align:center}
.spinner{width:42px;height:42px;border:3px solid #e5e7eb;border-top-color:#16a34a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.big-icon{font-size:52px;margin-bottom:12px}
.title{font-size:20px;font-weight:700;color:#16a34a;margin-bottom:8px}
.title.deny{color:#dc2626}
.sub{font-size:13px;color:#888;line-height:1.6}
.hint{margin-top:12px;font-size:12px;color:#aaa;word-break:break-all}

/* ── หน้า dashboard (เฟสต่อไปจะเติม) ── */
#dashboard{display:none;max-width:960px;margin:0 auto;padding:16px}
.topbar{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.topbar .brand{font-size:18px;font-weight:700;color:#16a34a}
.topbar .user{display:flex;align-items:center;gap:10px;font-size:13px;color:#444}
.topbar .user img{width:34px;height:34px;border-radius:50%;object-fit:cover}
.role-badge{font-size:11px;font-weight:600;border-radius:4px;padding:2px 8px}
.role-badge.admin{background:#dcfce7;color:#15803d}
.role-badge.viewer{background:#e0e7ff;color:#4338ca}
.placeholder{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:48px 24px;text-align:center;color:#9ca3af;font-size:14px}

/* ── toolbar: search + filter ── */
.toolbar{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:14px 16px;margin-bottom:14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{font-family:'Sarabun',sans-serif;border:1.5px solid #e5e7eb;border-radius:5px;padding:8px 12px;font-size:13px;outline:none;background:#fafafa}
.toolbar input:focus,.toolbar select:focus{border-color:#16a34a;background:#fff}
.toolbar input{flex:1;min-width:160px}
.toolbar .count{font-size:12px;color:#888;white-space:nowrap}

/* ── table ── */
.table-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.07);overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
thead th{background:#f0fdf4;color:#15803d;font-weight:600;text-align:left;padding:10px 12px;white-space:nowrap;border-bottom:2px solid #dcfce7;position:sticky;top:0}
tbody td{padding:9px 12px;border-bottom:1px solid #f1f5f9;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis}
tbody tr:hover{background:#fafafa}
td.editable{cursor:pointer}
td.editable:hover{background:#f0fdf4}
td input{width:100%;font-family:'Sarabun',sans-serif;border:1.5px solid #16a34a;border-radius:4px;padding:4px 6px;font-size:13px;outline:none}
.row-actions{display:flex;gap:6px}
.icon-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:4px 6px;border-radius:4px;line-height:1}
.icon-btn:hover{background:#f1f5f9}
.icon-btn.danger:hover{background:#fef2f2}
.empty-row td{text-align:center;color:#9ca3af;padding:40px;font-size:13px}
.loading-row td{text-align:center;color:#9ca3af;padding:30px}

/* ── edit modal (การ์ดโปรไฟล์แก้ไขรวด) ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-start;justify-content:center;padding:20px 16px;overflow-y:auto}
.modal-overlay.active{display:flex}
.profile-modal{background:#fff;border-radius:14px;max-width:380px;width:100%;margin-top:30px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.profile-modal-head{background:#f0fdf4;padding:20px;text-align:center;position:relative}
.profile-modal-head .avatar{width:84px;height:84px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.1);background:#e5e7eb}
.profile-modal-head .pname{margin-top:10px;font-weight:700;font-size:17px;color:#15803d}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;color:#888;cursor:pointer;line-height:1}
.profile-modal-body{padding:18px 20px;max-height:60vh;overflow-y:auto}
.pf-field{margin-bottom:14px}
.pf-field label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:5px}
.pf-field input{width:100%;border:1.5px solid #e5e7eb;border-radius:5px;padding:9px 11px;font-size:14px;font-family:'Sarabun',sans-serif;outline:none;background:#fafafa}
.pf-field input:focus{border-color:#16a34a;background:#fff}
.pf-field input:disabled{background:#f1f5f9;color:#9ca3af;cursor:not-allowed}
.profile-modal-foot{padding:14px 20px;border-top:1px solid #f1f5f9;display:flex;gap:10px}
.btn-modal{flex:1;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:600;padding:11px;border:none;border-radius:5px;cursor:pointer}
.btn-modal.save{background:#16a34a;color:#fff}
.btn-modal.save:hover{background:#15803d}
.btn-modal.save:disabled{background:#86efac;cursor:not-allowed}
.btn-modal.cancel{background:#f4f4f5;color:#444}
</style>
</head>
<body>

<!-- LOADING / LOGIN / DENIED -->
<div id="gate" class="center">
  <div class="card">
    <div class="spinner" id="gate-spin"></div>
    <div class="title" id="gate-title">กำลังตรวจสอบสิทธิ์…</div>
    <p class="sub" id="gate-sub">โปรดรอสักครู่</p>
    <p class="hint" id="gate-hint"></p>
  </div>
</div>

<!-- DASHBOARD (เฟส 1 แสดงแค่ topbar + placeholder) -->
<div id="dashboard">
  <div class="topbar">
    <div class="brand">Blissé Admin</div>
    <div class="user">
      <img id="u-photo" src="" alt=""/>
      <div>
        <div id="u-name" style="font-weight:600"></div>
        <span id="u-role" class="role-badge"></span>
      </div>
    </div>
  </div>
  <div class="toolbar">
    <input id="search-box" type="text" placeholder="🔍 ค้นหา ชื่อเล่น / TikTok / เบอร์..." oninput="renderTable()"/>
    <span class="count" id="row-count"></span>
  </div>
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead id="thead-row"><tr><th>กำลังโหลด...</th></tr></thead>
        <tbody id="tbody-rows"><tr class="loading-row"><td>กำลังโหลดข้อมูล…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- EDIT MODAL — การ์ดโปรไฟล์แก้ไขรวด -->
<div class="modal-overlay" id="edit-modal">
  <div class="profile-modal">
    <div class="profile-modal-head">
      <button class="modal-close" onclick="closeEditModal()">✕</button>
      <img class="avatar" id="pm-avatar" src="" alt=""/>
      <div class="pname" id="pm-name"></div>
    </div>
    <div class="profile-modal-body" id="pm-fields"></div>
    <div class="profile-modal-foot">
      <button class="btn-modal cancel" onclick="closeEditModal()">ยกเลิก</button>
      <button class="btn-modal save" id="pm-save-btn" onclick="saveEditModal()">💾 บันทึก</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyX3Jms83O3DDYV6_9bsDptFsAWG5BinutE9Am9HrRD3oIDT79TI1zOZA5NBviO9zYi/exec';

// LIFF ID — ใช้ตัวเดียวกับฟอร์มหลัก (login ผ่าน LINE)
// จะดึงจาก getConfig (liff_id) เพื่อไม่ต้อง hardcode
let LIFF_ID = '';
let me = { lineId:'', name:'', role:'', photo:'' };

const el = (id) => document.getElementById(id);

function setGate(title, sub, hint, deny) {
  el('gate-title').textContent = title;
  el('gate-title').className = 'title' + (deny ? ' deny' : '');
  el('gate-sub').textContent = sub || '';
  el('gate-hint').textContent = hint || '';
}
function hideSpinner(){ const s=el('gate-spin'); if(s) s.style.display='none'; }

async function gasPost(payload) {
  const r = await fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:new URLSearchParams(payload)
  });
  return r.json();
}

(async () => {
  try {
    // 1) ดึง liff_id จาก config — ใช้ liff_id_backend ก่อน (ถ้ามี) ไม่งั้น fallback liff_id เดิม
    setGate('กำลังโหลด…','กำลังดึงการตั้งค่า');
    const cfg = await gasPost({action:'getConfig'});
    const c = cfg.config || cfg;
    LIFF_ID = c.liff_id_backend || cfg.liff_id_backend || c.liff_id || cfg.liff_id || '';
    if (!LIFF_ID) { hideSpinner(); setGate('ตั้งค่าไม่ครบ','ไม่พบ liff_id','', true); return; }

    // 2) LINE login
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login({ redirectUri: location.href }); return; }
    const profile = await liff.getProfile();
    me.lineId = profile.userId;
    me.name   = profile.displayName;
    me.photo  = profile.pictureUrl || '';

    // 3) เช็คสิทธิ์ฝั่ง GAS (whitelist)
    setGate('กำลังตรวจสอบสิทธิ์…','');
    const res = await gasPost({ action:'bk_login', lineId:me.lineId, lineName:me.name });

    if (!res.success || !res.granted) {
      // ไม่มีสิทธิ์ — แจ้ง + (GAS บันทึก log แล้ว)
      hideSpinner();
      setGate('ไม่มีสิทธิ์เข้าถึง', 'บัญชี LINE ของคุณไม่อยู่ในรายชื่อผู้ดูแล', 'LINE ID: '+me.lineId, true);
      el('big') && (el('big').textContent = '🚫');
      // เปลี่ยน spinner เป็นไอคอนห้าม
      const card = document.querySelector('#gate .card');
      const icon = document.createElement('div');
      icon.className = 'big-icon'; icon.textContent = '🚫';
      card.insertBefore(icon, card.firstChild);
      return;
    }

    // 4) ผ่าน — เข้า dashboard
    me.role = res.role || 'viewer';
    me.name = res.name || me.name;
    el('gate').style.display = 'none';
    el('dashboard').style.display = 'block';
    el('u-photo').src = me.photo;
    el('u-name').textContent = me.name;
    const rb = el('u-role');
    rb.textContent = me.role === 'admin' ? 'ผู้ดูแล (admin)' : 'ผู้ชม (viewer)';
    rb.className = 'role-badge ' + (me.role === 'admin' ? 'admin' : 'viewer');

    await loadTable();

  } catch (err) {
    hideSpinner();
    setGate('เกิดข้อผิดพลาด', err.message || 'ลองใหม่อีกครั้ง', '', true);
  }
})();

// ══════════════════════ ตาราง CRUD ══════════════════════
let TABLE_COLS = [];
let TABLE_ROWS = [];

async function loadTable() {
  try {
    const res = await gasPost({ action:'bk_list', lineId: me.lineId });
    if (!res.success) throw new Error(res.error || 'โหลดข้อมูลไม่สำเร็จ');
    TABLE_COLS = res.columns;
    TABLE_ROWS = res.rows;
    buildHeader();
    renderTable();
  } catch (err) {
    el('tbody-rows').innerHTML = `<tr class="empty-row"><td colspan="10">⚠️ ${err.message}</td></tr>`;
  }
}

function buildHeader() {
  let html = '<tr>';
  TABLE_COLS.forEach(c => { html += `<th>${c.label}</th>`; });
  if (me.role === 'admin') html += '<th>จัดการ</th>';
  html += '</tr>';
  el('thead-row').innerHTML = html;
}

function renderTable() {
  const q = el('search-box').value.trim().toLowerCase();
  const filtered = !q ? TABLE_ROWS : TABLE_ROWS.filter(row =>
    TABLE_COLS.some(c => String(row[c.key] ?? '').toLowerCase().includes(q))
  );

  el('row-count').textContent = filtered.length + ' / ' + TABLE_ROWS.length + ' รายการ';

  if (!filtered.length) {
    el('tbody-rows').innerHTML = `<tr class="empty-row"><td colspan="${TABLE_COLS.length+1}">ไม่พบข้อมูล</td></tr>`;
    return;
  }

  let html = '';
  filtered.forEach(row => {
    html += `<tr data-row="${row._rowIndex}">`;
    TABLE_COLS.forEach(c => {
      const val = row[c.key] ?? '';
      const editableCls = (me.role === 'admin' && c.editable) ? 'editable' : '';
      html += `<td class="${editableCls}" data-key="${c.key}" onclick="${editableCls ? `startEdit(this, ${row._rowIndex})` : ''}">${escapeHtml(String(val))}</td>`;
    });
    if (me.role === 'admin') {
      html += `<td><div class="row-actions">
        <button class="icon-btn" onclick="openEditModal(${row._rowIndex})" title="แก้ไข">✏️</button>
        <button class="icon-btn danger" onclick="deleteRow(${row._rowIndex})" title="ลบ">🗑️</button>
      </div></td>`;
    }
    html += '</tr>';
  });
  el('tbody-rows').innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── inline edit: คลิกเซลล์ → กลายเป็น input ── 
function startEdit(td, rowIndex) {
  if (td.querySelector('input')) return; // กำลังแก้อยู่แล้ว
  const key = td.dataset.key;
  const oldVal = td.textContent;
  td.innerHTML = `<input type="text" value="${oldVal.replace(/"/g,'&quot;')}"/>`;
  const input = td.querySelector('input');
  input.focus();
  input.select();

  const save = async () => {
    const newVal = input.value;
    if (newVal === oldVal) { td.textContent = oldVal; return; }
    td.textContent = '...';
    try {
      const res = await gasPost({
        action:'bk_update', lineId: me.lineId,
        rowIndex, updates: JSON.stringify({ [key]: newVal })
      });
      if (!res.success) throw new Error(res.error || 'บันทึกไม่สำเร็จ');
      td.textContent = newVal;
      // sync ค่าใน TABLE_ROWS เพื่อให้ search ใช้ค่าล่าสุด
      const row = TABLE_ROWS.find(r => r._rowIndex === rowIndex);
      if (row) row[key] = newVal;
    } catch (err) {
      alert('แก้ไขไม่สำเร็จ: ' + err.message);
      td.textContent = oldVal;
    }
  };

  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { td.textContent = oldVal; }
  });
}

async function deleteRow(rowIndex) {
  if (!confirm('ยืนยันลบรายการนี้? การลบไม่สามารถย้อนกลับได้')) return;
  try {
    const res = await gasPost({ action:'bk_delete', lineId: me.lineId, rowIndex });
    if (!res.success) throw new Error(res.error || 'ลบไม่สำเร็จ');
    TABLE_ROWS = TABLE_ROWS.filter(r => r._rowIndex !== rowIndex);
    renderTable();
  } catch (err) {
    alert('ลบไม่สำเร็จ: ' + err.message);
  }
}

// ══════════════════════ EDIT MODAL — การ์ดโปรไฟล์แก้ไขรวด ══════════════════════
let EDIT_ROW_INDEX = null;

function openEditModal(rowIndex) {
  const row = TABLE_ROWS.find(r => r._rowIndex === rowIndex);
  if (!row) return;
  EDIT_ROW_INDEX = rowIndex;

  el('pm-avatar').src = row._photo || '';
  el('pm-name').textContent = row.nickname || row.line_name || '—';

  // เรียงฟิลด์ลงมา — editable ก่อน, ที่เหลือ (อ่านอย่างเดียว) ต่อท้าย
  const editableFirst = [...TABLE_COLS].sort((a,b) => (b.editable - a.editable));
  let html = '';
  editableFirst.forEach(c => {
    const val = row[c.key] ?? '';
    html += `<div class="pf-field">
      <label>${c.label}${c.editable ? '' : ' 🔒'}</label>
      <input type="text" data-key="${c.key}" value="${String(val).replace(/"/g,'&quot;')}" ${c.editable ? '' : 'disabled'}/>
    </div>`;
  });
  el('pm-fields').innerHTML = html;
  el('edit-modal').classList.add('active');
}

function closeEditModal() {
  el('edit-modal').classList.remove('active');
  EDIT_ROW_INDEX = null;
}

async function saveEditModal() {
  if (!EDIT_ROW_INDEX) return;
  const inputs = el('pm-fields').querySelectorAll('input:not(:disabled)');
  const updates = {};
  inputs.forEach(inp => { updates[inp.dataset.key] = inp.value; });

  const btn = el('pm-save-btn');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  try {
    const res = await gasPost({
      action:'bk_update', lineId: me.lineId,
      rowIndex: EDIT_ROW_INDEX, updates: JSON.stringify(updates)
    });
    if (!res.success) throw new Error(res.error || 'บันทึกไม่สำเร็จ');

    // sync ค่าใน TABLE_ROWS + re-render ตาราง
    const row = TABLE_ROWS.find(r => r._rowIndex === EDIT_ROW_INDEX);
    if (row) Object.assign(row, updates);
    renderTable();
    closeEditModal();
  } catch (err) {
    alert('บันทึกไม่สำเร็จ: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = '💾 บันทึก';
  }
}
</script>
</body>
</html>
