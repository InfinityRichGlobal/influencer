<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<title>Blissé • Share</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
:root{--bg:#f0fdf4;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--accent:#16a34a;--shadow:0 10px 30px rgba(2,6,23,.08);--radius:14px}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;font-family:'Sarabun',ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial;background:var(--bg);color:var(--ink)}
.wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
.card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:var(--radius);padding:28px 22px;text-align:center}
h3{margin:0 0 8px;font-size:1.1rem}
p{margin:6px 0 0;color:var(--muted);font-size:.92rem}
.spinner{width:38px;height:38px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:14px auto 6px}
@keyframes spin{to{transform:rotate(360deg)}}
.hint{margin-top:14px;font-size:.78rem;color:var(--muted);opacity:.85;word-break:break-all}
.btn{margin-top:16px;width:100%;padding:13px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;background:var(--accent);color:#fff;font-family:inherit}
</style>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h3 id="head">กำลังเตรียมแชร์…</h3>
    <div class="spinner" id="spin"></div>
    <p id="msg">โปรดรอสักครู่</p>
    <p class="hint" id="hint"></p>
  </div>
</div>
<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyX3Jms83O3DDYV6_9bsDptFsAWG5BinutE9Am9HrRD3oIDT79TI1zOZA5NBviO9zYi/exec";

const el=(id)=>document.getElementById(id);
function setMsg(title,message,hint=""){
  el("head").textContent=title;
  el("msg").textContent=message;
  el("hint").textContent=hint;
  document.title=title;
}
function hideSpinner(){ const s=el("spin"); if(s) s.style.display='none'; }

// อ่าน ?share= จากหลายที่ (query, hash, liff.state, redirectUri)
function getShareParam(){
  const q1=new URLSearchParams(location.search).get("share");
  if(q1) return q1;
  if(location.hash){
    const hash=location.hash.replace(/^#\/?/,"");
    const qs=hash.includes("?")?hash.split("?")[1]:"";
    if(qs){ const q2=new URLSearchParams(qs).get("share"); if(q2) return q2; }
  }
  const state=new URLSearchParams(location.search).get("liff.state");
  if(state){
    try{ const s=decodeURIComponent(state); const qs=s.split("?")[1]||"";
      const q3=new URLSearchParams(qs).get("share"); if(q3) return q3; }catch(e){}
  }
  const redirect=new URLSearchParams(location.search).get("liff.redirectUri");
  if(redirect){
    try{ const u=new URL(decodeURIComponent(redirect));
      const q4=new URLSearchParams(u.search).get("share"); if(q4) return q4; }catch(e){}
  }
  const m=location.href.match(/[?&]share=([^&#]+)/);
  return m?decodeURIComponent(m[1]):null;
}

// POST แบบ form-urlencoded (ตรงกับ doPost ที่รองรับ e.parameter)
async function gasPost(action, params={}){
  const body=new URLSearchParams({action, ...params});
  const res=await fetch(GAS_URL,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});
  return res.json();
}

(async()=>{
  const flexId=getShareParam();
  if(!flexId){
    hideSpinner();
    setMsg("ไม่พบรหัสสำหรับแชร์","missing ?share=","ลิงก์ต้องมี ?share=FLEX_ID");
    return;
  }

  try{
    setMsg("กำลังเตรียมแชร์…","กำลังดึงการตั้งค่า");
    const cfg=await gasPost("getConfig");
    const liffId=cfg.liff_id_share || (cfg.config && cfg.config.liff_id_share) || "";
    if(!liffId){
      hideSpinner();
      setMsg("การตั้งค่าไม่สมบูรณ์","ไม่พบ liff_id_share","กรอก liff_id_share ใน config");
      return;
    }

    await liff.init({liffId});
    if(!liff.isLoggedIn()){ liff.login({redirectUri:location.href}); return; }

    setMsg("กำลังโหลดข้อมูล…","กำลังดึง Flex");
    const data=await gasPost("getFlexById",{flexId});
    if(data.status!=="success" || !data.flex){
      hideSpinner();
      setMsg("ไม่พบข้อมูล Flex","flex_id ผิดหรือหมดอายุ","flex_id: "+flexId);
      return;
    }

    setMsg("เปิดหน้าต่างเลือกแชร์…","กำลังเปิด Share Target Picker");
    if(!liff.isApiAvailable("shareTargetPicker")){
      hideSpinner();
      setMsg("อุปกรณ์ไม่รองรับ","ShareTargetPicker ใช้ไม่ได้","เปิดใน LINE app");
      return;
    }

    const result=await liff.shareTargetPicker([{
      type:"flex",
      altText:data.altText || "• Blissé •",
      contents:data.flex
    }]);

    hideSpinner();
    if(result && result.status==="success"){
      setMsg("แชร์สำเร็จ! ✅","ขอบคุณครับ");
      setTimeout(()=>{ try{liff.closeWindow();}catch(e){} }, 1200);
    }else{
      setMsg("พร้อมแชร์อีกครั้ง","กดปุ่มเพื่อเลือกผู้รับใหม่");
      const b=document.createElement("button");
      b.className="btn"; b.textContent="📤 เลือกผู้รับอีกครั้ง";
      b.onclick=()=>location.reload();
      el("msg").after(b);
    }
  }catch(err){
    hideSpinner();
    setMsg("เกิดข้อผิดพลาด",err.message||"ลองใหม่อีกครั้ง");
  }
})();
</script>
</body>
</html>
