<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Join the Blissé Campaign</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f0fdf4;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{max-width:360px;width:100%;margin:0 auto;padding:24px 16px;text-align:center}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.09);padding:32px 24px}
.icon{font-size:52px;margin-bottom:12px}
.title{font-size:18px;font-weight:700;color:#15803d;margin-bottom:8px}
.sub{font-size:13px;color:#888;margin-bottom:20px}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
.btn-green{background:#16a34a;color:#fff}
.btn-gray{background:#f4f4f5;color:#555}
.err{color:#dc2626;font-size:13px;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:40px;height:40px;border:3px solid #16a34a;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="view-loading">
    <div class="spinner"></div>
    <p style="font-size:14px;color:#888">กำลังเตรียมแชร์...</p>
  </div>

  <div class="card" id="view-ready" style="display:none">
    <div class="icon">📤</div>
    <div class="title">พร้อมแชร์ผลงาน</div>
    <div class="sub">กดปุ่มด้านล่างเพื่อเลือกผู้รับใน LINE</div>
    <button class="btn btn-green" onclick="doShare()">📤 เลือกผู้รับ / กลุ่ม</button>
    <button class="btn btn-gray"  onclick="closePage()">ยกเลิก</button>
  </div>

  <div class="card" id="view-error" style="display:none">
    <div class="icon">❌</div>
    <p id="err-msg" class="err">เกิดข้อผิดพลาด</p>
    <button class="btn btn-gray" onclick="closePage()">ปิด</button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxMK6RAGjuRdfN52qQdeuanX66Lyd7uk7JuYFwe6_HcUhenmGHiRSDgO2qmIZiqZus/exec';
let flexMsg = null;

async function gasPost(p) {
  const r = await fetch(GAS_URL, {method:'POST', body:JSON.stringify(p)});
  return r.json();
}

function show(id) {
  ['view-loading','view-ready','view-error'].forEach(v => {
    document.getElementById(v).style.display = v===id ? 'block' : 'none';
  });
}

function showErr(msg) {
  document.getElementById('err-msg').textContent = msg;
  show('view-error');
}

async function init() {
  try {
    // ดึง lineId จาก URL param
    const params = new URLSearchParams(location.search);
    const lineIdFromUrl = params.get('lineId');

    const cfgRes = await gasPost({action:'getConfig'});
    if (!cfgRes.success) throw new Error('โหลด config ไม่สำเร็จ');
    const liffId = cfgRes.config['liff_id'];
    if (!liffId) throw new Error('ไม่พบ liff_id');

    await liff.init({liffId});
    if (!liff.isLoggedIn()) { liff.login({redirectUri:location.href}); return; }

    const profile = await liff.getProfile();
    // ใช้ lineId จาก URL ก่อน (กรณีเปิดจาก Flex button ของคนอื่น)
    // ถ้าไม่มีให้ใช้ lineId ของ user ที่ login อยู่
    const targetId = lineIdFromUrl || profile.userId;

    const res = await gasPost({action:'getFlexJson', lineId:targetId});
    if (!res.success || !res.flexJson) throw new Error('ไม่พบข้อมูล Flex Message\nกรุณาส่งงานก่อน');

    flexMsg = JSON.parse(res.flexJson);
    show('view-ready');
  } catch(err) {
    showErr(err.message);
  }
}

async function doShare() {
  if (!flexMsg) return;
  try {
    if (!liff.isApiAvailable('shareTargetPicker')) {
      throw new Error('ShareTargetPicker ไม่รองรับในอุปกรณ์นี้\nกรุณาเปิดใน LINE app');
    }
    const result = await liff.shareTargetPicker([flexMsg]);
    if (result && result.status === 'success') {
      alert('แชร์สำเร็จ! ✅');
      closePage();
    }
    // status === 'cancel' → user ปิดเอง ไม่ทำอะไร
  } catch(err) {
    showErr('แชร์ไม่สำเร็จ: ' + err.message);
  }
}

function closePage() {
  try { liff.closeWindow(); } catch(e) { window.close(); }
}

window.addEventListener('load', init);
</script>
</body>
</html>
